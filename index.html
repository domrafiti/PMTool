<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PM Tool</title>
<style>
  :root {
    --bg: #ffffff; --bg-alt: #f7f8fa; --bg-hover: #eef2f7;
    --border: #dfe3ea; --border-strong: #c2c9d3;
    --text: #1f2328; --text-muted: #5e6573;
    --accent: #2563eb; --accent-soft: #dbeafe;
    --danger: #dc2626; --warn: #d97706; --ok: #059669;
    --bar: #4f46e5; --bar-soft: #c7d2fe;
    --row-height: 32px; --header-height: 36px; --day-width: 28px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: var(--text); font-size: 13px; background: var(--bg); }
  button { font: inherit; color: inherit; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; cursor: pointer; }
  button:hover { background: var(--bg-hover); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { filter: brightness(0.95); }
  button.danger { color: var(--danger); border-color: #f3c4c4; }
  button.icon { padding: 4px 6px; line-height: 1; }
  input, select { font: inherit; color: inherit; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 4px 6px; }
  input:focus, select:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
  .app { display: flex; flex-direction: column; height: 100vh; min-height: 480px; }
  .toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--bg-alt); flex-wrap: wrap; }
  .toolbar .sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
  .toolbar .grow { flex: 1; }
  .toolbar .status { font-size: 12px; color: var(--text-muted); }
  .toolbar .status.err { color: var(--danger); }
  .toolbar .status.ok { color: var(--ok); }
  .view-switch { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .view-switch button { border: none; border-radius: 0; padding: 5px 12px; background: var(--bg); }
  .view-switch button.active { background: var(--accent); color: #fff; }
  .main { flex: 1; overflow: hidden; position: relative; }
  .table-wrap { height: 100%; overflow: auto; }
  table.grid { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; }
  table.grid th, table.grid td { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 0; height: var(--row-height); vertical-align: middle; background: var(--bg); position: relative; }
  table.grid thead th { position: sticky; top: 0; z-index: 5; background: var(--bg-alt); height: var(--header-height); font-weight: 600; color: var(--text); text-align: left; user-select: none; }
  table.grid thead th .th-inner { display: flex; align-items: center; padding: 0 8px; gap: 4px; height: 100%; cursor: pointer; }
  table.grid thead th .th-inner:hover { background: var(--bg-hover); }
  table.grid thead th .grip { position: absolute; right: 0; top: 0; bottom: 0; width: 5px; cursor: col-resize; }
  table.grid thead th .grip:hover { background: var(--accent-soft); }
  table.grid thead th .menu-btn { margin-left: auto; opacity: 0; padding: 2px 4px; border: 1px solid transparent; border-radius: 4px; background: transparent; }
  table.grid thead th:hover .menu-btn { opacity: 1; }
  table.grid thead th .menu-btn:hover { background: var(--bg); border-color: var(--border); }
  table.grid thead th.group-header { text-align: center; background: var(--bg); border-bottom: 1px solid var(--border-strong); font-weight: 600; }
  table.grid thead th.group-header .th-inner { justify-content: center; cursor: pointer; }
  table.grid tbody td .cell { padding: 0 8px; height: 100%; display: flex; align-items: center; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  table.grid tbody td .cell input, table.grid tbody td .cell select { width: 100%; height: 100%; border: none; background: transparent; padding: 0; }
  table.grid tbody td .cell input:focus, table.grid tbody td .cell select:focus { background: var(--bg); }
  table.grid tbody tr:hover td { background: var(--bg-hover); }
  .name-cell { display: flex; align-items: center; gap: 2px; padding: 0 4px 0 0; height: 100%; }
  .name-cell .indent { flex-shrink: 0; }
  .name-cell .chevron { width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted); border-radius: 3px; flex-shrink: 0; }
  .name-cell .chevron:hover { background: var(--bg-hover); }
  .name-cell .chevron.placeholder { visibility: hidden; }
  .name-cell .name-input { flex: 1; border: none; background: transparent; padding: 4px 4px; min-width: 0; }
  .name-cell .name-input:focus { background: var(--bg); outline: 1px solid var(--accent); border-radius: 3px; }
  .row-actions { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); display: none; gap: 2px; }
  tr:hover .row-actions { display: flex; }
  .row-actions button { padding: 2px 5px; font-size: 11px; line-height: 1; background: var(--bg); }
  .progress-bar { width: 100%; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--ok); }
  .gantt-wrap { height: 100%; display: grid; grid-template-columns: 320px 1fr; overflow: hidden; }
  .gantt-left, .gantt-right { overflow: auto; height: 100%; }
  .gantt-left { border-right: 1px solid var(--border); }
  .gantt-left table { width: 100%; border-collapse: separate; border-spacing: 0; }
  .gantt-left th, .gantt-left td { border-bottom: 1px solid var(--border); padding: 0; height: var(--row-height); }
  .gantt-left thead th { position: sticky; top: 0; background: var(--bg-alt); height: var(--header-height); padding: 0 8px; text-align: left; z-index: 2; }
  .gantt-right { position: relative; }
  .gantt-canvas { position: relative; }
  .gantt-header { position: sticky; top: 0; z-index: 4; background: var(--bg-alt); border-bottom: 1px solid var(--border-strong); height: var(--header-height); display: flex; }
  .gantt-month { border-right: 1px solid var(--border); padding: 4px 8px; font-weight: 600; font-size: 12px; }
  .gantt-day-row { display: flex; height: 16px; position: absolute; top: 18px; left: 0; right: 0; }
  .gantt-day-cell { width: var(--day-width); text-align: center; font-size: 10px; color: var(--text-muted); border-right: 1px solid var(--border); height: 100%; line-height: 16px; }
  .gantt-day-cell.weekend { background: var(--bg-alt); }
  .gantt-day-cell.today { background: var(--accent-soft); font-weight: 700; color: var(--accent); }
  .gantt-rows { position: relative; }
  .gantt-row { height: var(--row-height); position: relative; border-bottom: 1px solid var(--border); }
  .gantt-bar { position: absolute; top: 5px; height: calc(var(--row-height) - 10px); background: var(--bar); border-radius: 4px; color: #fff; font-size: 11px; padding: 0 6px; line-height: calc(var(--row-height) - 10px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; box-shadow: 0 1px 2px rgba(0,0,0,0.15); cursor: pointer; }
  .gantt-bar.parent { background: var(--text); height: 8px; top: 12px; border-radius: 2px; }
  .gantt-bar .gantt-progress { position: absolute; left: 0; top: 0; bottom: 0; background: rgba(255,255,255,0.3); border-radius: 4px 0 0 4px; }
  .gantt-today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--danger); pointer-events: none; z-index: 1; }
  .menu { position: absolute; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 1000; min-width: 200px; padding: 4px; }
  .menu button { display: block; width: 100%; text-align: left; background: transparent; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
  .menu button:hover { background: var(--bg-hover); }
  .menu button.danger { color: var(--danger); }
  .menu .menu-sep { height: 1px; background: var(--border); margin: 4px 0; }
  .menu .menu-label { padding: 6px 10px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,0.4); display: flex; align-items: center; justify-content: center; z-index: 2000; }
  .modal { background: var(--bg); border-radius: 8px; box-shadow: 0 16px 48px rgba(0,0,0,0.2); width: 520px; max-width: 95vw; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal h2 { margin: 0; padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 15px; }
  .modal .modal-body { padding: 14px 16px; overflow: auto; }
  .modal .modal-footer { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; background: var(--bg-alt); }
  .field { display: block; margin-bottom: 10px; }
  .field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 3px; font-weight: 500; }
  .field input, .field select, .field textarea { width: 100%; }
  .col-list { list-style: none; padding: 0; margin: 0; }
  .col-list li { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; background: var(--bg); }
  .col-list li.dragging { opacity: 0.4; }
  .col-list .handle { cursor: grab; color: var(--text-muted); user-select: none; }
  .col-list .col-name { flex: 1; }
  .col-list .col-type { color: var(--text-muted); font-size: 12px; min-width: 70px; }
  .empty-state { padding: 40px 20px; text-align: center; color: var(--text-muted); }
  .empty-state h3 { margin: 0 0 8px; }
  .group-collapsed-cell { width: 24px; min-width: 24px; max-width: 24px; background: var(--bg-alt) !important; text-align: center; cursor: pointer; }
  .group-collapsed-cell:hover { background: var(--bg-hover) !important; }
  .drag-handle { cursor: grab; opacity: 0; padding: 1px 3px; color: var(--text-muted); user-select: none; font-size: 11px; line-height: 1; flex-shrink: 0; }
  .drag-handle:active { cursor: grabbing; }
  tr:hover .drag-handle { opacity: 0.6; }
  .drag-handle:hover { opacity: 1 !important; background: var(--bg-hover); border-radius: 3px; }
  tr.row-dragging td { opacity: 0.4; }
  tr.drop-above td { box-shadow: inset 0 2px 0 var(--accent); }
  tr.drop-below td { box-shadow: inset 0 -2px 0 var(--accent); }
  tr.drop-into td { background: var(--accent-soft) !important; }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="toolbar">
    <div class="view-switch">
      <button data-view="table" class="active" id="btnViewTable">Table</button>
      <button data-view="gantt" id="btnViewGantt">Gantt</button>
    </div>
    <div class="sep"></div>
    <button id="btnAddRow" class="primary">+ Add row</button>
    <button id="btnManageCols">Columns</button>
    <button id="btnFilter">Filter <span id="filterCount"></span></button>
    <input type="search" id="searchInput" placeholder="Search…" style="width:160px">
    <div class="sep"></div>
    <button id="btnSync" title="Sync with JSONBin">Sync</button>
    <button id="btnRefresh" title="Pull latest from bin (no overwrite confirmation)">↻ Refresh</button>
    <button id="btnTest" title="Test connection (read-only)">Test</button>
    <button id="btnSettings">Settings</button>
    <button id="btnExport" title="Export JSON">Export</button>
    <button id="btnImport" title="Import JSON">Import</button>
    <div class="grow"></div>
    <div class="status" id="status">Loading…</div>
  </div>
  <div class="main" id="main">
    <div class="table-wrap" id="tableWrap">
      <table class="grid" id="grid"><thead></thead><tbody></tbody></table>
    </div>
    <div class="gantt-wrap" id="ganttWrap" style="display:none">
      <div class="gantt-left">
        <table><thead><tr><th>Task</th></tr></thead><tbody id="ganttLeftBody"></tbody></table>
      </div>
      <div class="gantt-right" id="ganttRight">
        <div class="gantt-canvas" id="ganttCanvas">
          <div class="gantt-header" id="ganttHeader"></div>
          <div class="gantt-rows" id="ganttRows"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<input type="file" id="fileImport" accept="application/json" style="display:none">
<script>
/* ============================================================
   SHARED DEPLOYMENT CONFIG  (edit these two lines before deploying)
   ------------------------------------------------------------
   Fill in to make the tool auto-load data for visitors who don't
   have JSONBin credentials of their own. Leave empty to require
   per-visitor setup (default).

   How to get values:
   1. Create your bin (you already did).
   2. JSONBin → Access Keys → "Create Access Key".
      - Scope: Bin → select your bin
      - Permissions: READ only (uncheck Update / Delete / Create)
      - Name: "PM Tool Read-Only"
      - Copy the resulting key.
   3. Paste below.
   ============================================================ */
const EMBEDDED_BIN_ID  = '6a03824ec0954111d813b079';   // 24-char hex from your bin URL
const EMBEDDED_READ_KEY = '$2a$10$6GrfNnloKC8SRUQraA0TQ.NcpJe46gZvQcOjj57JysAJ5W8jJ/KhG';  // JSONBin read-only Access Key ($2a$10$…)

const uid = () => 'i_' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
const DEFAULT_STATE = () => ({
  version: 3,
  columns: [
    { id: 'col_name',     label: 'Name',     type: 'text',     group: 'Core',     width: 280, visible: true, locked: true },
    { id: 'col_status',   label: 'Status',   type: 'select',   group: 'Core',     width: 130, visible: true, options: ['Not Started','In Progress','Blocked','Done'] },
    { id: 'col_owner',    label: 'Owner',    type: 'text',     group: 'Core',     width: 140, visible: true },
    { id: 'col_priority', label: 'Priority', type: 'select',   group: 'Core',     width: 100, visible: true, options: ['Low','Medium','High','Critical'] },
    { id: 'col_start',    label: 'Start',    type: 'date',     group: 'Timeline', width: 120, visible: true },
    { id: 'col_end',      label: 'End',      type: 'date',     group: 'Timeline', width: 120, visible: true },
    { id: 'col_deps',     label: 'Depends on', type: 'deps',   group: 'Timeline', width: 180, visible: true, locked: true },
    { id: 'col_progress', label: '% Done',   type: 'number',   group: 'Timeline', width: 90,  visible: true },
    { id: 'col_done',     label: 'Done?',    type: 'checkbox', group: 'Timeline', width: 70,  visible: true },
    { id: 'col_notes',    label: 'Notes',    type: 'text',     group: 'Details',  width: 220, visible: true }
  ],
  rows: [],
  collapsedGroups: [],
  ui: { view: 'table', sortBy: null, search: '', filters: {} },
  settings: { jsonbinApiKey: '', jsonbinBinId: '' }
});
function sampleRow(p,e,v){return{id:uid(),parentId:p,expanded:e!==false,values:v||{}};}
function today(o){const d=new Date();d.setDate(d.getDate()+(o||0));return d.toISOString().slice(0,10);}
const LS_KEY = 'pmtool.state.v3';
let state = (function(){
  try { const v = localStorage.getItem(LS_KEY); if (v) return JSON.parse(v); } catch(e){}
  const s = DEFAULT_STATE();
  const init = sampleRow(null, true, { col_name: 'Sample Initiative', col_status: 'In Progress', col_owner: 'You', col_priority: 'High', col_start: today(0), col_end: today(30), col_progress: 25 });
  s.rows.push(init);
  const p1 = sampleRow(init.id, true, { col_name: 'Phase 1: Planning', col_status: 'Done', col_owner: 'You', col_priority: 'High', col_start: today(0), col_end: today(7), col_progress: 100, col_done: true });
  const p2 = sampleRow(init.id, true, { col_name: 'Phase 2: Build', col_status: 'In Progress', col_owner: 'You', col_priority: 'High', col_start: today(8), col_end: today(21), col_progress: 40 });
  s.rows.push(p1, p2);
  s.rows.push(sampleRow(p2.id, true, { col_name: 'Design schema', col_status: 'Done', col_owner: 'You', col_start: today(8), col_end: today(11), col_progress: 100, col_done: true }));
  s.rows.push(sampleRow(p2.id, true, { col_name: 'Implement API', col_status: 'In Progress', col_owner: 'You', col_start: today(12), col_end: today(18), col_progress: 50 }));
  return s;
})();
function saveLocal(){try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}}

function depthOf(r){let d=0,c=r;while(c&&c.parentId){c=state.rows.find(x=>x.id===c.parentId);d++;if(d>100)break;}return d;}
function descendantsOf(id){const o=[],s=[id];while(s.length){const c=s.pop();for(const r of state.rows)if(r.parentId===c){o.push(r);s.push(r.id);}}return o;}
function isDescendant(maybeChildId, ancestorId) {
  let cur = state.rows.find(r => r.id === maybeChildId);
  while (cur && cur.parentId) {
    if (cur.parentId === ancestorId) return true;
    cur = state.rows.find(r => r.id === cur.parentId);
  }
  return false;
}
let dragSourceRowId = null;
function attachRowDrag(handle, row) {
  handle.addEventListener('dragstart', (e) => {
    dragSourceRowId = row.id;
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', row.id); } catch (err) {}
    const tr = handle.closest('tr');
    if (tr) {
      tr.classList.add('row-dragging');
      try { e.dataTransfer.setDragImage(tr, 20, 10); } catch (err) {}
    }
  });
  handle.addEventListener('dragend', () => {
    const tr = handle.closest('tr');
    if (tr) tr.classList.remove('row-dragging');
    document.querySelectorAll('.drop-above, .drop-below, .drop-into').forEach(el => el.classList.remove('drop-above', 'drop-below', 'drop-into'));
    dragSourceRowId = null;
  });
}
function attachRowDrop(tr, row) {
  tr.addEventListener('dragover', (e) => {
    if (!dragSourceRowId || dragSourceRowId === row.id) return;
    if (isDescendant(row.id, dragSourceRowId)) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const rect = tr.getBoundingClientRect();
    const y = e.clientY - rect.top;
    const h = rect.height;
    let pos;
    if (y < h * 0.25) pos = 'above';
    else if (y > h * 0.75) pos = 'below';
    else pos = 'into';
    document.querySelectorAll('.drop-above, .drop-below, .drop-into').forEach(el => el.classList.remove('drop-above', 'drop-below', 'drop-into'));
    tr.classList.add('drop-' + pos);
    tr.dataset.dropPos = pos;
  });
  tr.addEventListener('dragleave', (e) => {
    if (!tr.contains(e.relatedTarget)) {
      tr.classList.remove('drop-above', 'drop-below', 'drop-into');
    }
  });
  tr.addEventListener('drop', (e) => {
    e.preventDefault();
    if (!dragSourceRowId || dragSourceRowId === row.id) return;
    if (isDescendant(row.id, dragSourceRowId)) return;
    const pos = tr.dataset.dropPos || 'below';
    moveRow(dragSourceRowId, row.id, pos);
    document.querySelectorAll('.drop-above, .drop-below, .drop-into').forEach(el => el.classList.remove('drop-above', 'drop-below', 'drop-into'));
  });
}
function moveRow(sourceId, targetId, position) {
  const source = state.rows.find(r => r.id === sourceId);
  const target = state.rows.find(r => r.id === targetId);
  if (!source || !target || sourceId === targetId) return;
  if (isDescendant(targetId, sourceId)) return;
  if (position === 'into') {
    source.parentId = target.id;
    target.expanded = true;
  } else {
    source.parentId = target.parentId;
  }
  const srcIdx = state.rows.indexOf(source);
  if (srcIdx >= 0) state.rows.splice(srcIdx, 1);
  const tgtIdx = state.rows.indexOf(target);
  if (position === 'above') state.rows.splice(tgtIdx, 0, source);
  else state.rows.splice(tgtIdx + 1, 0, source);
  saveLocal();
  render();
}
function getOrderedRows(){const o=[];(function w(p){for(const r of state.rows)if(r.parentId===p){o.push(r);w(r.id);}})(null);return o;}
function getVisibleRows(){return getOrderedRows().filter(r=>{let c=r;while(c.parentId){const p=state.rows.find(x=>x.id===c.parentId);if(!p)break;if(p.expanded===false)return false;c=p;}return true;});}
function applySearchAndFilter(rows){
  const q=(state.ui.search||'').trim().toLowerCase();
  const filters=state.ui.filters||{};
  const fe=Object.entries(filters).filter(([_,v])=>v!==''&&v!=null);
  if(!q&&fe.length===0)return rows;
  const m=new Set();
  for(const r of rows){
    let pass=true;
    if(q){const hay=Object.values(r.values||{}).map(v=>String(v??'').toLowerCase()).join(' ');if(!hay.includes(q))pass=false;}
    if(pass)for(const[c,v]of fe){if(String(r.values?.[c]??'').toLowerCase()!==String(v).toLowerCase()){pass=false;break;}}
    if(pass){m.add(r.id);let c=r;while(c.parentId){m.add(c.parentId);c=state.rows.find(x=>x.id===c.parentId);if(!c)break;}}
  }
  return rows.filter(r=>m.has(r.id));
}
function applySort(rows){
  if(!state.ui.sortBy)return rows;
  const{columnId,direction}=state.ui.sortBy;
  const col=state.columns.find(c=>c.id===columnId);if(!col)return rows;
  const bp=new Map();
  for(const r of rows){const k=r.parentId||'__root__';if(!bp.has(k))bp.set(k,[]);bp.get(k).push(r);}
  for(const arr of bp.values()){
    arr.sort((a,b)=>{
      let va=a.values?.[columnId],vb=b.values?.[columnId];
      if(col.type==='number'||col.type==='date'){
        va=va==null||va===''?-Infinity:(col.type==='date'?new Date(va).getTime():+va);
        vb=vb==null||vb===''?-Infinity:(col.type==='date'?new Date(vb).getTime():+vb);
        return direction==='asc'?va-vb:vb-va;
      }
      va=String(va??'').toLowerCase();vb=String(vb??'').toLowerCase();
      if(va<vb)return direction==='asc'?-1:1;
      if(va>vb)return direction==='asc'?1:-1;
      return 0;
    });
  }
  const out=[];(function w(p){for(const r of(bp.get(p||'__root__')||[])){out.push(r);w(r.id);}})(null);return out;
}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function escapeHtml(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function isBlocked(row) {
  const deps = row.values?.col_deps || [];

  save.addEventListener('click', () => { row.values[col.id] = Array.from(currentDeps); saveLocal(); render(); back.remove(); });
}

function openSettings() {
  const body = document.createElement('div');
  body.innerHTML = `
    <div class="field"><label>JSONBin Master Key (X-Master-Key)</label><input type="password" id="settingsKey" placeholder="$2a$10$… (looks like a long hash)"></div>
    <div class="field"><label>JSONBin Bin ID</label><input type="text" id="settingsBin" placeholder="24-char hex from the bin URL"></div>
    <p style="font-size:12px;color:var(--text-muted);margin:0">
      Sign up at <a href="https://jsonbin.io" target="_blank" rel="noopener">jsonbin.io</a> (free), create a bin with content <code>{}</code>, then copy:
      <br>• <strong>API Keys</strong> → Master Key
      <br>• <strong>My Bins</strong> → click the bin → copy the Bin ID
      <br>Treat both like a password — anyone with them can read/write your bin.
    </p>`;
  const k = body.querySelector('#settingsKey'); const b = body.querySelector('#settingsBin');
  k.value = state.settings.jsonbinApiKey || ''; b.value = state.settings.jsonbinBinId || '';
  const cancel = document.createElement('button'); cancel.textContent = 'Cancel';
  const save = document.createElement('button'); save.className = 'primary'; save.textContent = 'Save';
  const back = openModal('Settings', body, [cancel, save]);
  cancel.addEventListener('click', () => back.remove());
  save.addEventListener('click', () => {
    state.settings.jsonbinApiKey = k.value.trim();
    state.settings.jsonbinBinId = extractBinId(b.value.trim());
    saveLocal(); back.remove(); updateStatus();
  });
}
function extractBinId(input) {
  if (!input) return '';
  // Tolerate full URLs like https://jsonbin.io/.../b/{ID} or https://api.jsonbin.io/v3/b/{ID}
  const m = input.match(/\/b\/([a-zA-Z0-9]+)/);
  return m ? m[1] : input;
}

/* ============================================================
   JSONBIN.IO API
   ============================================================ */
async function jsonbinApi(method, body) {
  const key = state.settings.jsonbinApiKey;
  const bin = state.settings.jsonbinBinId;
  if (!key || !bin) throw new Error('JSONBin not configured. Open Settings.');
  const url = method === 'GET'
    ? `https://api.jsonbin.io/v3/b/${bin}/latest`
    : `https://api.jsonbin.io/v3/b/${bin}`;
  const headers = { 'Content-Type': 'application/json', 'X-Master-Key': key };
  const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
  const text = await res.text();
  if (!res.ok) {
    let err = null; try { err = JSON.parse(text); } catch {}
    const msg = err?.message || ('HTTP ' + res.status + ': ' + text.slice(0, 200));
    throw new Error(msg);
  }
  return text ? JSON.parse(text) : {};
}

async function testConnection() {
  if (!state.settings.jsonbinApiKey || !state.settings.jsonbinBinId) {
    alert('Configure Settings first (API key + bin ID).'); openSettings(); return;
  }
  setStatus('Testing…');
  try {
    const result = await jsonbinApi('GET');
    // JSONBin v3 returns: { record: {...}, metadata: {...} }
    const data = result.record;
    let rowCount = 0;
    if (data && data.rows && Array.isArray(data.rows)) rowCount = data.rows.length;
    setStatus('Connection OK · ' + rowCount + ' rows · ' + new Date().toLocaleTimeString(), 'ok');
    alert('Connection OK.\nJSONBin reachable.\nRows currently in bin: ' + rowCount + (rowCount === 0 ? '\n\n(Bin is empty or contains non-PM-Tool data — push your local data with Sync to seed it.)' : ''));
  } catch (e) {
    setStatus('Test failed: ' + e.message, 'err');
    alert('Connection FAILED.\n\nUnderlying error:\n' + e.message + '\n\nCommon causes:\n• API key wrong (check Master Key on jsonbin.io)\n• Bin ID wrong\n• Bin was deleted or you don\'t have access\n• jsonbin.io blocked by your network proxy — if so, try GitHub Gist instead (ask Claude to switch)');
  }
}

async function syncNow() {
  if (!state.settings.jsonbinApiKey || !state.settings.jsonbinBinId) {
    if (EMBEDDED_BIN_ID && EMBEDDED_READ_KEY) {
      alert('You are in viewer mode (read-only).\n\nTo make edits that save remotely, configure your own JSONBin Master Key in Settings — that grants you admin permissions.');
    } else {
      alert('Configure Settings first.'); openSettings();
    }
    return;
  }
  setStatus('Syncing…');
  try {
    const choice = confirm('Sync direction:\n\nOK = push local → bin (overwrites remote)\nCancel = pull bin → local (overwrites local)');
    if (choice) {
      const json = JSON.stringify(state);
      await jsonbinApi('PUT', state);
      setStatus(`Pushed ${json.length} bytes · ${new Date().toLocaleTimeString()}`, 'ok');
    } else {
      const result = await jsonbinApi('GET');
      const remote = result.record;
      if (!remote || !remote.columns || !remote.rows) {
        if (!confirm('Bin is empty or not a valid PM Tool snapshot. Push local data to it now?')) { setStatus('Pull cancelled'); return; }
        return syncNow();
      }
      state = remote; saveLocal(); render();
      setStatus('Pulled from bin · ' + new Date().toLocaleTimeString(), 'ok');
    }
  } catch (e) {
    setStatus('Sync error: ' + e.message, 'err');
    alert('Sync FAILED.\n\nUnderlying error:\n' + e.message);
  }
}

function exportJson() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'pmtool-export-' + new Date().toISOString().slice(0,10) + '.json'; a.click();
}
function importJson(file) {
  const r = new FileReader();
  r.onload = () => {
    try { const j = JSON.parse(r.result); if (!j.columns || !j.rows) throw new Error('Not a valid PM Tool export.');
      if (!confirm('Replace all current data with imported file?')) return;
      state = j; saveLocal(); render(); updateStatus();
    } catch (e) { alert('Import failed: ' + e.message); }
  };
  r.readAsText(file);
}
function setStatus(t, k) { const el = document.getElementById('status'); el.textContent = t; el.className = 'status' + (k ? ' ' + k : ''); }
function updateStatus() {
  const hasOwnKey = state.settings.jsonbinApiKey && state.settings.jsonbinBinId;
  const hasEmbedded = EMBEDDED_BIN_ID && EMBEDDED_READ_KEY;
  if (hasOwnKey) { setStatus('Admin · can edit & sync', 'ok'); return; }
  if (hasEmbedded) { setStatus('Viewer mode · read-only', 'ok'); return; }
  setStatus('Setup needed — click Settings');
}

async function refreshFromBin() {
  setStatus('Refreshing…');
  // Admin path: pull via master key, overwrites local (no confirm — explicit "Refresh" intent)
  if (state.settings.jsonbinApiKey && state.settings.jsonbinBinId) {
    try {
      const result = await jsonbinApi('GET');
      const remote = result.record;
      if (!remote || !remote.columns || !remote.rows) throw new Error('Bin content is not a valid PM Tool snapshot.');
      const localUi = { ...state.ui };
      const localSettings = { ...state.settings };
      state = remote;
      state.ui = localUi;
      state.settings = localSettings;
      saveLocal(); render();
      setStatus('Refreshed from bin · ' + new Date().toLocaleTimeString(), 'ok');
    } catch (e) {
      setStatus('Refresh failed: ' + e.message, 'err');
      alert('Refresh FAILED.\n\n' + e.message);
    }
    return;
  }
  // Viewer path: re-fetch via embedded read key
  if (EMBEDDED_BIN_ID && EMBEDDED_READ_KEY) { return autoLoadFromEmbeddedBin(); }
  alert('Nothing to refresh from — configure JSONBin in Settings, or set EMBEDDED_BIN_ID + EMBEDDED_READ_KEY in the HTML for viewer mode.');
}

async function autoLoadFromEmbeddedBin() {
  if (!EMBEDDED_BIN_ID || !EMBEDDED_READ_KEY) return;
  // Skip auto-load if user has their own master key — admins manage sync direction manually
  if (state.settings.jsonbinApiKey && state.settings.jsonbinBinId) return;
  try {
    setStatus('Loading shared data…');
    const res = await fetch('https://api.jsonbin.io/v3/b/' + EMBEDDED_BIN_ID + '/latest', {
      headers: { 'X-Access-Key': EMBEDDED_READ_KEY }
    });
    const text = await res.text();
    if (!res.ok) {
      let err = null; try { err = JSON.parse(text); } catch {}
      throw new Error(err?.message || ('HTTP ' + res.status + ': ' + text.slice(0, 200)));
    }
    const data = JSON.parse(text);
    if (!data.record || !data.record.columns || !data.record.rows) {
      throw new Error('Shared bin does not contain valid PM Tool data');
    }
    // Preserve local UI state (view mode, filters, search) across auto-load
    const localUi = { ...state.ui };
    state = data.record;
    state.ui = localUi;
    saveLocal();
    render();
    setStatus('Viewer · loaded ' + data.record.rows.length + ' rows · ' + new Date().toLocaleTimeString(), 'ok');
  } catch (e) {
    setStatus('Could not load shared data: ' + e.message, 'err');
    console.error('autoLoadFromEmbeddedBin failed', e);
  }
}

function renderGantt() {
  const rows = applySearchAndFilter(applySort(getVisibleRows()));
  const dates = [];
  for (const r of rows) { const s=r.values?.col_start, e=r.values?.col_end; if (s) dates.push(new Date(s)); if (e) dates.push(new Date(e)); }
  let minD, maxD;
  if (dates.length === 0) { minD = new Date(); minD.setDate(minD.getDate() - 7); maxD = new Date(); maxD.setDate(maxD.getDate() + 30); }
  else { minD = new Date(Math.min(...dates)); maxD = new Date(Math.max(...dates)); minD.setDate(minD.getDate() - 3); maxD.setDate(maxD.getDate() + 3); }
  minD.setHours(0,0,0,0); maxD.setHours(0,0,0,0);
  const totalDays = Math.max(1, Math.ceil((maxD - minD) / 86400000) + 1);
  const dayWidth = 28; const canvasWidth = totalDays * dayWidth;
  const leftBody = document.getElementById('ganttLeftBody'); leftBody.innerHTML = '';
  for (const r of rows) {
    const tr = document.createElement('tr'); const td = document.createElement('td');
    const wrap = document.createElement('div'); wrap.className = 'name-cell';
    const indent = document.createElement('span'); indent.className='indent'; indent.style.width = (depthOf(r)*18)+'px'; wrap.appendChild(indent);
    const chev = document.createElement('span'); chev.className = 'chevron';
    const hasChildren = state.rows.some(x => x.parentId === r.id);
    if (hasChildren) { chev.textContent = r.expanded ? '▾' : '▸'; chev.addEventListener('click', () => { r.expanded = !r.expanded; render(); }); }
    else { chev.classList.add('placeholder'); chev.textContent = '·'; }
    wrap.appendChild(chev);
    const name = document.createElement('span'); name.textContent = r.values?.col_name || 'Untitled';
    name.style.flex='1'; name.style.overflow='hidden'; name.style.textOverflow='ellipsis'; name.style.whiteSpace='nowrap'; name.style.padding='0 6px';
    wrap.appendChild(name); td.appendChild(wrap); tr.appendChild(td); leftBody.appendChild(tr);
  }
  const canvas = document.getElementById('ganttCanvas'); canvas.style.width = canvasWidth + 'px';
  const header = document.getElementById('ganttHeader'); header.innerHTML = '';
  const months = [];
  for (let i = 0; i < totalDays; i++) {
    const d = new Date(minD); d.setDate(minD.getDate() + i);
    const key = d.getFullYear() + '-' + d.getMonth();
    const last = months[months.length - 1];
    if (last && last.key === key) last.span++; else months.push({ key, label: d.toLocaleString(undefined, { month: 'long', year: 'numeric' }), span: 1 });
  }
  const monthRow = document.createElement('div'); monthRow.style.display='flex'; monthRow.style.height='18px';
  for (const m of months) { const el = document.createElement('div'); el.className='gantt-month'; el.style.width=(m.span*dayWidth)+'px'; el.style.lineHeight='18px'; el.style.padding='0 6px'; el.style.fontSize='11px'; el.textContent = m.label; monthRow.appendChild(el); }
  header.appendChild(monthRow);
  const dayRow = document.createElement('div'); dayRow.className='gantt-day-row'; dayRow.style.position='static';
  const todayStr = new Date().toISOString().slice(0,10);
  for (let i = 0; i < totalDays; i++) {
    const d = new Date(minD); d.setDate(minD.getDate()+i);
    const cell = document.createElement('div'); cell.className='gantt-day-cell';
    if (d.getDay()===0 || d.getDay()===6) cell.classList.add('weekend');
    if (d.toISOString().slice(0,10) === todayStr) cell.classList.add('today');
    cell.textContent = d.getDate(); dayRow.appendChild(cell);
  }
  header.appendChild(dayRow);
  const rowsEl = document.getElementById('ganttRows'); rowsEl.innerHTML = ''; rowsEl.style.width = canvasWidth + 'px';
  for (const r of rows) {
    const rowEl = document.createElement('div'); rowEl.className='gantt-row';
    for (let i = 0; i < totalDays; i++) {
      const d = new Date(minD); d.setDate(minD.getDate()+i);
      if (d.getDay()===0 || d.getDay()===6) { const s = document.createElement('div'); s.style.position='absolute'; s.style.left=(i*dayWidth)+'px'; s.style.top='0'; s.style.bottom='0'; s.style.width=dayWidth+'px'; s.style.background='rgba(0,0,0,0.025)'; s.style.pointerEvents='none'; rowEl.appendChild(s); }
    }
    const s=r.values?.col_start, e=r.values?.col_end;
    if (s && e) {
      const sd = new Date(s); sd.setHours(0,0,0,0); const ed = new Date(e); ed.setHours(0,0,0,0);
      const offset = Math.round((sd-minD)/86400000); const len = Math.max(1, Math.round((ed-sd)/86400000)+1);
      const bar = document.createElement('div'); bar.className='gantt-bar';
      if (state.rows.some(x => x.parentId === r.id)) bar.classList.add('parent');
      bar.style.left = (offset*dayWidth)+'px'; bar.style.width = (len*dayWidth-2)+'px';
      bar.title = `${r.values?.col_name||''}  (${s} → ${e})`; bar.textContent = r.values?.col_name||'';
      const pct = clamp(+(r.values?.col_progress||0),0,100);
      if (pct > 0 && !bar.classList.contains('parent')) { const prog = document.createElement('div'); prog.className='gantt-progress'; prog.style.width = pct+'%'; bar.appendChild(prog); }
      rowEl.appendChild(bar);
    }
    rowsEl.appendChild(rowEl);
  }

  // ---- Dependency arrows (SVG overlay) ----
  const rowIndexMap = new Map();
  rows.forEach((r, i) => rowIndexMap.set(r.id, i));
  const arrows = [];
  for (let depIdx = 0; depIdx < rows.length; depIdx++) {
    const dep = rows[depIdx];
    const deps = dep.values?.col_deps || [];
    if (!deps.length) continue;
    const depStart = dep.values?.col_start;
    if (!depStart) continue;
    for (const predId of deps) {
      const predIdx = rowIndexMap.get(predId);
      if (predIdx === undefined) continue; // predecessor not in current visible set
      const pred = state.rows.find(r => r.id === predId);
      if (!pred) continue;
      const predEnd = pred.values?.col_end;
      if (!predEnd) continue;
      const predEndD = new Date(predEnd); predEndD.setHours(0,0,0,0);
      const depStartD = new Date(depStart); depStartD.setHours(0,0,0,0);
      const predEndOffset = Math.round((predEndD - minD) / 86400000);
      const x1 = (predEndOffset + 1) * dayWidth - 2;
      const y1 = predIdx * 32 + 16;
      const depStartOffset = Math.round((depStartD - minD) / 86400000);
      const x2 = depStartOffset * dayWidth;
      const y2 = depIdx * 32 + 16;
      const isConflict = depStartD < predEndD;
      arrows.push({ x1, y1, x2, y2, isConflict, predName: pred.values?.col_name || '', depName: dep.values?.col_name || '' });
    }
  }
  if (arrows.length) {
    const svgNs = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNs, 'svg');
    svg.style.position = 'absolute'; svg.style.top = '0'; svg.style.left = '0';
    svg.setAttribute('width', canvasWidth);
    svg.setAttribute('height', rows.length * 32);
    svg.style.pointerEvents = 'none';
    svg.style.zIndex = '3';
    const defs = document.createElementNS(svgNs, 'defs');
    defs.innerHTML = '<marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/></marker><marker id="ah-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/></marker>';
    svg.appendChild(defs);
    for (const a of arrows) {
      const path = document.createElementNS(svgNs, 'path');
      const elbow = Math.max(a.x1 + 8, a.x2 - 8);
      path.setAttribute('d', 'M ' + a.x1 + ' ' + a.y1 + ' L ' + elbow + ' ' + a.y1 + ' L ' + elbow + ' ' + a.y2 + ' L ' + (a.x2 - 4) + ' ' + a.y2);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', a.isConflict ? '#dc2626' : '#6b7280');
      path.setAttribute('stroke-width', '1.5');
      path.setAttribute('marker-end', a.isConflict ? 'url(#ah-red)' : 'url(#ah)');
      path.style.pointerEvents = 'visibleStroke';
      const title = document.createElementNS(svgNs, 'title');
      title.textContent = a.predName + ' → ' + a.depName + (a.isConflict ? '\n⚠️ CONFLICT: dependent starts before predecessor ends' : '');
      path.appendChild(title);
      svg.appendChild(path);
    }
    rowsEl.appendChild(svg);
  }

  const todayD = new Date(); todayD.setHours(0,0,0,0);
  if (todayD >= minD && todayD <= maxD) {
    const offset = Math.round((todayD-minD)/86400000);
    const line = document.createElement('div'); line.className='gantt-today-line'; line.style.left = (offset*dayWidth+dayWidth/2)+'px'; line.style.height = rowsEl.offsetHeight + 'px';
    rowsEl.appendChild(line);
  }
}

document.getElementById('btnViewGantt').addEventListener('click', () => { state.ui.view = 'gantt'; render(); });

document.getElementById('fileImport').addEventListener('change', (e) => { if (e.target.files[0]) importJson(e.target.files[0]); e.target.value = ''; });

updateStatus();
